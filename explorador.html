<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explorador VOUAR</title>
<style>
:root{
  --bg:#0d1117;--sidebar:#0A1B2E;--accent:#4B8EF5;--green:#1DB87A;--purple:#8B7CF5;
  --text:#e6edf3;--muted:#8b949e;--border:#21262d;--hover:#161b22;
  --folder:#f0b72f;--folder-sup:#8b949e;--sidebar-w:320px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;font-size:15px;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;}

/* ── SIDEBAR ──────────────────────────────────────── */
#sidebar{width:var(--sidebar-w);min-width:200px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;resize:horizontal;overflow:auto;}
#sidebar-header{padding:16px 16px 12px;border-bottom:1px solid var(--border);}
#sidebar-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
#updated{font-size:11px;color:var(--muted);margin-top:6px;display:flex;align-items:center;gap:5px;}
#dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;flex-shrink:0;}
#search{width:100%;padding:8px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:var(--text);font-family:inherit;font-size:14px;outline:none;}
#search:focus{border-color:var(--accent);}
#search::placeholder{color:var(--muted);}
#tree{flex:1;overflow-y:auto;overflow-x:auto;padding:6px 0;}
#tree::-webkit-scrollbar{width:6px;height:6px;}
#tree::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px;}

/* ── TREE ROWS ────────────────────────────────────── */
.row{display:flex;align-items:center;height:32px;padding-right:10px;cursor:pointer;white-space:nowrap;border-radius:5px;margin:0 6px 1px;}
.row:hover{background:var(--hover);}
.row.selected{background:#1a2d4a;}
.toggle{width:20px;flex-shrink:0;text-align:center;color:var(--muted);font-size:10px;user-select:none;}
.icon{width:22px;flex-shrink:0;text-align:center;font-size:14px;}
.label{flex:1;overflow:hidden;text-overflow:ellipsis;font-size:13px;letter-spacing:.01em;}
.label.dim{color:var(--muted);font-size:12px;}
.sz{color:var(--muted);font-size:10px;margin-left:5px;flex-shrink:0;}
.cnt{color:var(--muted);font-size:10px;margin-left:4px;background:#21262d;padding:1px 6px;border-radius:10px;flex-shrink:0;}

/* ── MAIN ─────────────────────────────────────────── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#topbar{padding:12px 22px;border-bottom:1px solid var(--border);background:var(--bg);display:flex;align-items:center;gap:12px;flex-wrap:wrap;min-height:50px;}
#breadcrumb{font-size:13px;color:var(--muted);flex:1;line-height:1.4;}
#stats{font-size:12px;color:var(--muted);background:var(--border);padding:3px 12px;border-radius:20px;flex-shrink:0;}
#content{flex:1;overflow-y:auto;padding:4px 0;}
#content::-webkit-scrollbar{width:8px;}
#content::-webkit-scrollbar-thumb{background:#30363d;border-radius:4px;}

/* ── CONTENT ITEMS ────────────────────────────────── */
.ci{display:flex;align-items:center;padding:5px 22px;height:38px;cursor:pointer;gap:12px;border-bottom:1px solid transparent;}
.ci:hover{background:var(--hover);}
.ci.fold{color:var(--folder);}
.ci.fold-sup{color:var(--folder-sup);}
.ci-ico{font-size:17px;width:24px;flex-shrink:0;}
.ci-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:15px;}
.ci-sz{font-size:12px;color:var(--muted);width:60px;text-align:right;flex-shrink:0;}

/* ── SECTION HEADER ───────────────────────────────── */
.sec-hdr{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:14px 22px 4px;margin-top:4px;}

/* ── ESTADOS ──────────────────────────────────────── */
#empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:15px;flex-direction:column;gap:10px;}
#loading{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:14px;gap:10px;}
.bc-link{color:var(--accent);cursor:pointer;}
.bc-link:hover{text-decoration:underline;}
.bc-cur{color:var(--text);}
.bc-sep{margin:0 4px;color:#30363d;}
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <div id="sidebar-title">&#127968; VOUAR &mdash; Explorador</div>
    <input id="search" type="text" placeholder="&#128269; Buscar arquivo ou pasta..." autocomplete="off">
    <div id="updated"><span id="dot"></span><span id="upd-text">carregando...</span></div>
  </div>
  <div id="tree"><div id="loading">&#8987;&nbsp; carregando árvore...</div></div>
</div>

<div id="main">
  <div id="topbar">
    <div id="breadcrumb">&#127968;</div>
    <div id="stats"></div>
  </div>
  <div id="content"><div id="empty">&#128194;&nbsp; Selecione uma pasta na árvore</div></div>
</div>

<script>
let T=null,exp=new Set(),sel=null,sm=false;

/* ── ÍCONES ─────────────────────────────────────── */
function gi(n){
  if(n.t==='d'){
    const nm=n.n;
    if(nm==='Academy')return'🎓';
    if(nm==='Canonico')return'📖';
    if(nm==='CIV')return'🧠';
    if(nm==='Comercial')return'💼';
    if(nm==='Conteudo')return'📱';
    if(nm==='FOCUS')return'🎯';
    if(nm==='Framework')return'🔬';
    if(nm==='Livros')return'📚';
    if(nm==='Mente')return'💡';
    if(nm==='Mentoria')return'🤝';
    if(nm==='Palestras')return'🎤';
    if(nm==='Produtos')return'📦';
    if(nm==='Projetos_Especiais')return'⭐';
    if(nm==='Terceiros')return'🌐';
    if(nm.startsWith('_'))return'⚙️';
    if(nm==='Prospects'||nm==='ISP-Anatel')return'🗄️';
    if(nm==='Propostas')return'📋';
    if(nm==='POPs_ISP')return'📌';
    if(nm==='Scripts'||nm==='Narrações')return'🎙️';
    if(nm==='Slides')return'🖼️';
    if(nm==='Squads'||nm==='Agentes')return'🤖';
    if(nm==='_ARQUIVO'||nm.includes('legac')||nm.includes('Histor'))return'🗂️';
    if(nm==='Corpus')return'📊';
    if(nm==='Sprints')return'⚡';
    if(nm==='Documentacao')return'📋';
    return'📁';
  }
  const x=n.n.toLowerCase();
  if(x.endsWith('.pdf'))return'📄';
  if(x.endsWith('.docx')||x.endsWith('.doc'))return'📝';
  if(x.endsWith('.xlsx')||x.endsWith('.xls'))return'📊';
  if(x.endsWith('.csv'))return'🗃️';
  if(x.endsWith('.pptx')||x.endsWith('.ppt'))return'📊';
  if(x.endsWith('.py'))return'🐍';
  if(x.endsWith('.js')||x.endsWith('.ts')||x.endsWith('.jsx')||x.endsWith('.tsx'))return'💛';
  if(x.endsWith('.html')||x.endsWith('.htm'))return'🌐';
  if(x.endsWith('.json'))return'🔧';
  if(x.endsWith('.md'))return'📋';
  if(x.endsWith('.png')||x.endsWith('.jpg')||x.endsWith('.jpeg')||x.endsWith('.gif')||x.endsWith('.svg'))return'🖼️';
  if(x.endsWith('.mp4')||x.endsWith('.mov'))return'🎬';
  if(x.endsWith('.mp3')||x.endsWith('.m4a'))return'🎵';
  if(x.endsWith('.zip')||x.endsWith('.tar')||x.endsWith('.gz'))return'📦';
  if(x.endsWith('.sh')||x.endsWith('.bash'))return'⚡';
  if(x.endsWith('.yaml')||x.endsWith('.yml')||x.endsWith('.toml')||x.endsWith('.env'))return'⚙️';
  if(x.endsWith('.sql'))return'🗄️';
  if(x.endsWith('.app'))return'📱';
  if(x.endsWith('.txt')||x.endsWith('.log'))return'📃';
  if(x.endsWith('.applescript'))return'🍎';
  return'📄';
}

function isSupport(name){return name.startsWith('_');}

function fn(key){
  const p=key.split('/').slice(1);
  let c=T;
  for(const x of p){
    if(!c.c)return null;
    c=c.c.find(n=>n.n===x);
    if(!c)return null;
  }
  return c;
}

/* ── ÁRVORE ─────────────────────────────────────── */
function rt(nodes,depth,pk){
  let h='';
  for(const n of nodes){
    const k=pk+'/'+n.n,isD=n.t==='d',open=exp.has(k),ind=depth*14,has=isD&&n.c&&n.c.length>0,cnt=isD&&n.c?n.c.length:0;
    const sup=isD&&isSupport(n.n);
    const col=sup?'color:var(--folder-sup)':'';
    h+=`<div class="row" data-key="${k.replace(/"/g,'&quot;')}" data-dir="${isD}" onclick="rc(event,this)"><div style="width:${ind}px;flex-shrink:0"></div><div class="toggle">${isD?(has?(open?'▾':'▸'):'·'):''}</div><div class="icon" style="${col}">${gi(n)}</div><div class="label${!isD?' dim':''}" style="${col}" title="${n.n.replace(/"/g,'&quot;')}">${n.n}</div>${n.s?`<div class="sz">${n.s}</div>`:''}${cnt>0?`<div class="cnt">${cnt}</div>`:''}</div>`;
    if(isD&&open&&n.c&&n.c.length>0)h+=rt(n.c,depth+1,k);
  }
  return h;
}

function rs(){
  const el=document.getElementById('tree');
  let h=`<div class="row" data-key="${T.n}" data-dir="true" onclick="rc(event,this)"><div class="toggle">▾</div><div class="icon">🏠</div><div class="label">${T.n}</div></div>`;
  h+=rt(T.c,1,T.n);
  el.innerHTML=h;
}

function rc(e,el){
  if(sm)return;
  const k=el.dataset.key,isD=el.dataset.dir==='true';
  document.querySelectorAll('.row.selected').forEach(r=>r.classList.remove('selected'));
  el.classList.add('selected');sel=k;
  const nd=fn(k);if(!nd)return;
  if(isD){exp.has(k)?exp.delete(k):exp.add(k);rs();setTimeout(()=>{document.querySelectorAll('.row').forEach(r=>{if(r.dataset.key===k)r.classList.add('selected');});},10);sc(nd,k);}
  else{const p=k.split('/');ub(p,null);}
}

/* ── PAINEL DIREITO ──────────────────────────────── */
function sc(nd,k){
  const ct=document.getElementById('content'),st=document.getElementById('stats'),p=k.split('/');
  ub(p,k);
  if(!nd.c||nd.c.length===0){ct.innerHTML=nd.p?'<div id="empty">🔒 Sem permissão</div>':'<div id="empty">📭 Pasta vazia</div>';st.textContent='';return;}
  const s=[...nd.c].sort((a,b)=>{if(a.t==='d'&&b.t!=='d')return -1;if(a.t!=='d'&&b.t==='d')return 1;return a.n.localeCompare(b.n);});
  const fld=s.filter(n=>n.t==='d'),fil=s.filter(n=>n.t==='f');
  st.textContent=`${fld.length} pastas · ${fil.length} arquivos`;
  let h='';
  if(fld.length>0){
    const prod=fld.filter(n=>!isSupport(n.n)),sup=fld.filter(n=>isSupport(n.n));
    if(prod.length>0){
      if(sup.length>0)h+=`<div class="sec-hdr">Áreas</div>`;
      for(const c of prod){const ck=k+'/'+c.n,cnt=c.c?c.c.length:'';h+=ci(c,ck,cnt);}
    }
    if(sup.length>0){
      h+=`<div class="sec-hdr">Suporte</div>`;
      for(const c of sup){const ck=k+'/'+c.n,cnt=c.c?c.c.length:'';h+=ci(c,ck,cnt);}
    }
  }
  if(fil.length>0){
    if(fld.length>0)h+=`<div class="sec-hdr">Arquivos</div>`;
    for(const c of fil){h+=ci(c,k+'/'+c.n,'');}
  }
  ct.innerHTML=h;
}

function ci(c,ck,cnt){
  const isD=c.t==='d',sup=isD&&isSupport(c.n);
  const cls=isD?(sup?'ci fold-sup':'ci fold'):'ci';
  const col=sup?'style="color:var(--folder-sup)"':'';
  return `<div class="${cls}" onclick="cc('${ck.replace(/'/g,"\\'")}',${isD})"><div class="ci-ico" ${col}>${gi(c)}</div><div class="ci-name" ${col}>${c.n}${isD&&cnt?` <span style="color:var(--muted);font-size:12px">(${cnt})</span>`:''}</div><div class="ci-sz">${c.s||''}</div></div>`;
}

function cc(k,isD){
  const nd=fn(k);if(!nd)return;
  if(isD){exp.add(k);rs();sc(nd,k);setTimeout(()=>{document.querySelectorAll('.row').forEach(r=>{const m=r.dataset.key===k;r.classList.toggle('selected',m);if(m)r.scrollIntoView({block:'nearest'});});},25);}
}

function ub(parts,curKey){
  const bc=document.getElementById('breadcrumb');
  let h='',cum='';
  for(let i=0;i<parts.length;i++){
    const p=parts[i];cum+=(i===0?'':'/'+p);const last=i===parts.length-1;
    if(i>0)h+=`<span class="bc-sep">/</span>`;
    if(last)h+=`<span class="bc-cur">${p}</span>`;
    else{const k=cum;h+=`<span class="bc-link" onclick="bcc('${k.replace(/'/g,"\\'")}')"> ${p}</span>`;}
  }
  bc.innerHTML=h;
}

function bcc(k){
  const nd=fn(k);if(!nd||nd.t!=='d')return;
  exp.add(k);rs();sc(nd,k);
  setTimeout(()=>{document.querySelectorAll('.row').forEach(r=>{r.classList.toggle('selected',r.dataset.key===k);});},25);
}

/* ── BUSCA ──────────────────────────────────────── */
let st2;
document.getElementById('search').addEventListener('input',function(){clearTimeout(st2);st2=setTimeout(()=>ds(this.value.trim()),200);});

function ds(q){
  if(!q){sm=false;rs();document.getElementById('content').innerHTML='<div id="empty">📂 Selecione uma pasta</div>';document.getElementById('breadcrumb').innerHTML='🏠';document.getElementById('stats').textContent='';return;}
  sm=true;const res=[];
  function wk(n,path){const fp=path+'/'+n.n;if(n.n.toLowerCase().includes(q.toLowerCase()))res.push({node:n,path:fp});if(n.c)for(const c of n.c)wk(c,fp);}
  for(const c of T.c)wk(c,T.n);
  const ct=document.getElementById('content'),st=document.getElementById('stats'),bc=document.getElementById('breadcrumb');
  bc.innerHTML=`🔍 <span style="color:var(--accent)">Busca: "${q}"</span>`;
  st.textContent=`${res.length} resultado(s)`;
  if(res.length===0){ct.innerHTML='<div style="padding:40px;text-align:center;color:var(--muted)">Nenhum arquivo encontrado</div>';return;}
  let h='';
  for(const{node:n,path}of res.slice(0,400)){
    const isD=n.t==='d',sup=isD&&isSupport(n.n),parts=path.split('/').slice(1),par=parts.slice(0,-1).join(' / ');
    const cls=isD?(sup?'ci fold-sup':'ci fold'):'ci';
    const col=sup?'style="color:var(--folder-sup)"':'';
    h+=`<div class="${cls}" onclick="sn('${path.replace(/'/g,"\\'")}',${isD})"><div class="ci-ico" ${col}>${gi(n)}</div><div style="flex:1;overflow:hidden"><div class="ci-name">${n.n}</div><div style="font-size:11px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${par}</div></div><div class="ci-sz">${n.s||''}</div></div>`;
  }
  if(res.length>400)h+=`<div style="padding:12px 22px;color:var(--muted);font-size:12px">... e mais ${res.length-400} resultados</div>`;
  ct.innerHTML=h;
}

function sn(path,isD){
  const nd=fn(path);if(!nd)return;
  document.getElementById('search').value='';sm=false;
  const pts=path.split('/');for(let i=2;i<=pts.length;i++)exp.add(pts.slice(0,i).join('/'));
  rs();if(isD)sc(nd,path);
  setTimeout(()=>{document.querySelectorAll('.row').forEach(r=>{const m=r.dataset.key===path;r.classList.toggle('selected',m);if(m)r.scrollIntoView({block:'center'});});},30);
}

/* ── AUTENTICAÇÃO ───────────────────────────────── */
const MESES=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

function senhaHoje(){
  const d=new Date(),dd=String(d.getDate()).padStart(2,'0'),mm=String(d.getMonth()+1).padStart(2,'0'),mes=MESES[d.getMonth()];
  return dd+mm+mes[1]+mes[2];
}

async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function hashHoje(){return sha256(senhaHoje());}

function mostrarLogin(){
  document.body.innerHTML=`
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;width:100vw;background:#0A1B2E;flex-direction:column;gap:20px;">
    <div style="width:56px;height:56px;background:#4B8EF5;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:4px;">🔐</div>
    <div style="font-size:20px;font-weight:700;color:#e6edf3;letter-spacing:.04em;">VOUAR — Explorador</div>
    <div style="font-size:14px;color:#8b949e;margin-bottom:4px;">Acesso restrito</div>
    <input id="pwd" type="password" placeholder="Senha do dia"
      style="padding:12px 18px;border-radius:8px;border:1px solid #30363d;background:#0d1117;color:#e6edf3;
             font-size:16px;width:260px;outline:none;text-align:center;font-family:inherit;"
      onkeydown="if(event.key==='Enter')verificar()">
    <button onclick="verificar()"
      style="padding:12px 36px;border-radius:8px;background:#4B8EF5;color:#fff;border:none;
             font-size:15px;cursor:pointer;font-family:inherit;font-weight:600;letter-spacing:.02em;">
      Entrar
    </button>
    <div id="erro" style="color:#f85149;font-size:13px;min-height:18px;"></div>
    <div style="font-size:12px;color:#444c56;margin-top:8px;">DD/MM + 2ª e 3ª letra do mês</div>
  </div>`;
  setTimeout(()=>document.getElementById('pwd').focus(),50);
}

async function verificar(){
  const pwd=document.getElementById('pwd').value;
  const[hashDigitado,hashDia]=await Promise.all([sha256(pwd),hashHoje()]);
  if(hashDigitado===hashDia){sessionStorage.setItem('vouar_auth',hashDia);location.reload();}
  else{document.getElementById('erro').textContent='Senha incorreta.';document.getElementById('pwd').value='';document.getElementById('pwd').focus();}
}

/* ── INIT ───────────────────────────────────────── */
hashHoje().then(hashDia=>{
  if(sessionStorage.getItem('vouar_auth')!==hashDia){
    mostrarLogin();
  }else{
    fetch('./data/files.json?t='+Date.now())
      .then(r=>r.json())
      .then(data=>{
        T=data;
        exp.add(T.n);
        const upd=document.getElementById('upd-text');
        if(T.updated)upd.textContent='Atualizado: '+T.updated;
        else upd.textContent='online';
        rs();
      })
      .catch(err=>{
        document.getElementById('tree').innerHTML='<div style="padding:20px;color:#f85149;font-size:13px">Erro ao carregar dados.<br>'+err+'</div>';
      });
  }
});
</script>
</body>
</html>
